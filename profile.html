<main class="profile-container container mt-4">

<!-- Welcome Message -->
<h4 id="welcomeText" class="mb-3 text-primary"></h4>

<h2 class="mb-4">Learner Profile</h2>

<!-- Name Section -->
<div class="card p-4 shadow mb-4">

<label><strong>Enter Your Name:</strong></label>

<input type="text" id="nameInput" class="form-control mb-2" placeholder="Enter your name">

<button class="btn btn-primary mb-3" onclick="saveName()">
Save Name
</button>

<p><strong>Name:</strong> <span id="username">Not set</span></p>

</div>

<!-- Completed Courses -->
<div class="card p-4 shadow mb-4">

<h3>Completed Courses</h3>

<ul id="courses"></ul>

</div>

<!-- Quiz Results -->
<div class="card p-4 shadow">

<h3>Quiz Results</h3>

<p id="score"></p>

</div>

<p>©️ 2026 E-Learning Platform</p>
