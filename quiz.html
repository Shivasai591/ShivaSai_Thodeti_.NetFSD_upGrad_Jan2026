<header>

<h1>E-Learning Platform</h1>

<nav>
<ul>

<main class="quiz-section container mt-4">

<h2>Course Quiz</h2>

<!-- Question Counter -->

<p id="questionCounter" class="fw-bold">
Answered 0 of 15 questions
</p>

<!-- Progress Bar -->

<div class="progress mb-4">

<div
id="quizProgressBar"
class="progress-bar progress-bar-striped progress-bar-animated"
role="progressbar"
style="width:0%">
</div>

</div>

<!-- Quiz Questions -->

<div id="quiz"></div>

<!-- Submit Button -->

<button class="btn btn-primary mt-3" onclick="submitQuiz()">
Submit Quiz
</button>

<!-- Quiz Result -->

<div id="result" class="mt-4"></div>

</main>

<footer>
<p>© 2026 E-Learning Platform</p>
</footer>
