<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multi-Page E-Learning Platform</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<header>

<h1>E-Learning Platform</h1>

<nav>
<ul>
<li><a class="active" href="dashboard.html">Dashboard</a></li>
<li><a href="courses.html">Courses</a></li>
<li><a href="quiz.html">Quiz</a></li>
<li><a href="profile.html">Profile</a></li>
</ul>
</nav>

<p class="breadcrumb">Home / Dashboard</p>

</header>


<main class="container mt-4">

<h2>Learning Progress</h2>

<div class="card p-4 shadow">

<h5>JavaScript Basics</h5>

<div class="progress mb-3">

<div id="jsProgress"
class="progress-bar bg-success"
style="width:0%">

</div>

</div>


<h5>HTML & CSS</h5>

<div class="progress mb-3">

<div id="htmlProgress"
class="progress-bar bg-success"
style="width:0%">

</div>

</div>


</div>


<div class="card p-4 shadow mt-4">

<h4>Total Learning Progress</h4>

<progress id="courseProgress" value="0" max="100" class="w-100"></progress>

<p id="progressText" class="mt-2">0% Completed</p>

</div>

</main>


<footer>

<p>© 2026 E-Learning Platform</p>

</footer>


<script>

let completed =
JSON.parse(localStorage.getItem("completedCourses")) || [];

let totalCourses = 2;

let progress =
Math.round((completed.length / totalCourses) * 100);

document.getElementById("courseProgress").value = progress;

document.getElementById("progressText").innerText =
progress + "% Completed";


if(completed.includes("JavaScript Basics")){

document.getElementById("jsProgress").style.width = "100%";

}

if(completed.includes("HTML & CSS")){

document.getElementById("htmlProgress").style.width = "100%";

}

</script>


</body>
</html>
